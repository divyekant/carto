name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install C dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Build
        run: go build -o carto ./cmd/carto

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -short ./...

  # golangci-lint enforces code quality gates:
  # errcheck, staticcheck, govet, gofmt, misspell.
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install C dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: go
          args: --timeout=5m

  # TypeScript type-check + production build gate.
  # Catches type errors and broken imports before they reach Docker.
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: go/web/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build
